<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sapthagiri NPS University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatBlob 8s ease-in-out infinite;
        }

        .bg-blob-1 {
            width: 500px;
            height: 500px;
            background: #667eea;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .bg-blob-2 {
            width: 400px;
            height: 400px;
            background: #764ba2;
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        .bg-blob-3 {
            width: 300px;
            height: 300px;
            background: #f093fb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1.5s;
        }

        @keyframes floatBlob {

            0%,
            100% {
                transform: scale(1) translateY(0);
            }

            50% {
                transform: scale(1.08) translateY(-20px);
            }
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Card */
        .login-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 0;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            overflow: hidden;
            max-width: 900px;
            width: 95%;
            min-height: 560px;
            animation: cardEntrance 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Left panel */
        .left-panel {
            flex: 1.1;
            background: linear-gradient(160deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.4) 100%);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.2) 0%, transparent 70%);
        }

        .university-logo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(102, 126, 234, 0.15);
            margin-bottom: 28px;
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(102, 126, 234, 0.15);
            }

            50% {
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 0 16px rgba(102, 126, 234, 0.08);
            }
        }

        .left-panel h1 {
            color: #fff;
            font-size: 1.6em;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 14px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .left-panel p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.93em;
            line-height: 1.7;
            position: relative;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 28px;
            position: relative;
        }

        .badge {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* Right panel */
        .right-panel {
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            color: #fff;
            font-size: 1.9em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            margin-bottom: 34px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* Form groups */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.82em;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            opacity: 0.7;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group select option {
            background: #302b63;
            color: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 16px;
            padding: 2px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .forgot-link {
            color: #a78bfa;
            font-size: 0.85em;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #c4b5fd;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Error / Success messages */
        .form-message {
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 0.87em;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.4s ease;
        }

        .form-message.error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.4);
            color: #ff7c8a;
            display: block;
        }

        .form-message.success {
            background: rgba(78, 205, 196, 0.15);
            border: 1px solid rgba(78, 205, 196, 0.4);
            color: #4ecdc4;
            display: block;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        /* Panel switching */
        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .left-panel {
                display: none;
            }

            .right-panel {
                padding: 40px 28px;
            }

            .login-wrapper {
                min-height: auto;
            }
        }
    </style>
</head>

<body>

    <!-- Background blobs -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <!-- Left Panel -->
        <div class="left-panel">
            <img src="https://tse4.mm.bing.net/th/id/OIP.G-4gqOISnJ_u6_q9QeFu0gHaEy?pid=Api&P=0&h=180"
                alt="Sapthagiri NPS University" class="university-logo">
            <h1>Sapthagiri NPS University</h1>
            <p>Your gateway to a world-class education. Access the AI Campus Assistant and explore everything the
                university has to offer.</p>
            <div class="badges">
                <span class="badge">🎓 NAAC Accredited</span>
                <span class="badge">🏆 Top Rankings</span>
                <span class="badge">🤖 AI-Powered</span>
                <span class="badge">🌐 Smart Campus</span>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="form-title">Welcome Back 👋</div>
            <div class="form-subtitle">Sign in to access your campus portal</div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Panel -->
            <div class="form-panel active" id="loginPanel">
                <div class="form-message" id="loginMsg"></div>
                <div class="form-group">
                    <label>Email / Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="text" id="loginEmail" placeholder="you@sapthagiri.edu.in" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password"
                            autocomplete="current-password">
                        <button class="password-toggle" onclick="togglePassword('loginPassword', this)"
                            type="button">👁️</button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
                    🚀 Sign In to Campus Portal
                </button>
            </div>

            <!-- Signup Panel -->
            <div class="form-panel" id="signupPanel">
                <div class="form-message" id="signupMsg"></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="signupFirst" placeholder="First name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="signupLast" placeholder="Last name">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="signupEmail" placeholder="you@sapthagiri.edu.in">
                    </div>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🎓</span>
                        <select id="signupRole">
                            <option value="">Select your role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="staff">Staff</option>
                            <option value="visitor">Visitor</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" placeholder="Create a strong password">
                        <button class="password-toggle" onclick="togglePassword('signupPassword', this)"
                            type="button">👁️</button>
                    </div>
                </div>
                <button class="submit-btn" id="signupBtn" onclick="handleSignup()">
                    ✨ Create Account
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Particles ---
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                width: ${2 + Math.random() * 4}px;
                height: ${2 + Math.random() * 4}px;
                animation-duration: ${6 + Math.random() * 10}s;
                animation-delay: ${Math.random() * 8}s;
                opacity: ${0.2 + Math.random() * 0.5};
            `;
            particlesContainer.appendChild(p);
        }

        // --- Tab switching ---
        function switchTab(tab) {
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
            clearMessages();
        }

        function clearMessages() {
            ['loginMsg', 'signupMsg'].forEach(id => {
                const el = document.getElementById(id);
                el.className = 'form-message';
                el.textContent = '';
            });
        }

        function showMessage(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `form-message ${type}`;
        }

        // --- Password toggle ---
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.textContent = isHidden ? '🙈' : '👁️';
        }

        // --- Demo credentials ---
        const DEMO_USERS = [
            { email: 'student@sapthagiri.edu.in', password: 'student123', name: 'Student', role: 'student' },
            { email: 'admin', password: 'admin123', name: 'Admin', role: 'admin' },
        ];

        // Load registered users from localStorage
        function getRegisteredUsers() {
            return JSON.parse(localStorage.getItem('snpsUsers') || '[]');
        }

        function saveUser(user) {
            const users = getRegisteredUsers();
            users.push(user);
            localStorage.setItem('snpsUsers', JSON.stringify(users));
        }

        // --- Login handler ---
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showMessage('loginMsg', '⚠️ Please fill in all fields.', 'error');
                return;
            }

            btn.textContent = '⏳ Signing in...';
            btn.classList.add('loading');

            setTimeout(() => {
                // Check demo + registered users
                const allUsers = [...DEMO_USERS, ...getRegisteredUsers()];
                const user = allUsers.find(u =>
                    (u.email === email || u.username === email) && u.password === password
                );

                if (user) {
                    localStorage.setItem('snpsLoggedIn', 'true');
                    localStorage.setItem('snpsUserName', user.name);
                    localStorage.setItem('snpsUserRole', user.role || 'student');
                    showMessage('loginMsg', `✅ Welcome, ${user.name}! Redirecting...`, 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                } else {
                    showMessage('loginMsg', '❌ Invalid credentials. Try: student@sapthagiri.edu.in / student123', 'error');
                    btn.textContent = '🚀 Sign In to Campus Portal';
                    btn.classList.remove('loading');
                }
            }, 1000);
        }

        // --- Signup handler ---
        function handleSignup() {
            const first = document.getElementById('signupFirst').value.trim();
            const last = document.getElementById('signupLast').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const role = document.getElementById('signupRole').value;
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');

            if (!first || !last || !email || !role || !password) {
                showMessage('signupMsg', '⚠️ Please fill in all fields.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('signupMsg', '⚠️ Password must be at least 6 characters.', 'error');
                return;
            }

            const existing = [...DEMO_USERS, ...getRegisteredUsers()].find(u => u.email === email);
            if (existing) {
                showMessage('signupMsg', '⚠️ This email is already registered.', 'error');
                return;
            }

            btn.textContent = '⏳ Creating account...';
            btn.classList.add('loading');

            setTimeout(() => {
                saveUser({ email, password, name: `${first} ${last}`, role });
                showMessage('signupMsg', '✅ Account created! Switching to Sign In...', 'success');
                btn.textContent = '✨ Create Account';
                btn.classList.remove('loading');
                setTimeout(() => switchTab('login'), 1500);
            }, 1000);
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginActive = document.getElementById('loginPanel').classList.contains('active');
                if (loginActive) handleLogin(); else handleSignup();
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('snpsLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
